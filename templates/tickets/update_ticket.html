{% extends "base.html" %}

{% block title %}Update Ticket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card page-card">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                    <div>
                        <h3 class="section-title mb-1">Update Ticket</h3>
                        <p class="section-subtitle mb-0">{{ ticket.title }}</p>
                    </div>
                    <a class="btn btn-outline-secondary" href="{% url 'all_tickets' %}">Back to All Tickets</a>
                </div>

                <div class="mb-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="content-note h-100">
                                <small class="text-muted d-block">Resident</small>
                                <strong>{{ ticket.resident }}</strong>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="content-note h-100">
                                <small class="text-muted d-block">Category</small>
                                <strong>{{ ticket.get_category_display }}</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <label class="form-label" for="status">Status</label>
                    <select name="status" id="status" class="form-select">
                        <option value="open" {% if ticket.status == "open" %}selected{% endif %}>Open</option>
                        <option value="assigned" {% if ticket.status == "assigned" %}selected{% endif %}>Assigned</option>
                        <option value="in_progress" {% if ticket.status == "in_progress" %}selected{% endif %}>In Progress</option>
                        <option value="closed" {% if ticket.status == "closed" %}selected{% endif %}>Closed</option>
                    </select>
                    <button class="btn btn-success mt-3">Update</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
