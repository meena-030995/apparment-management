{% extends "base.html" %}

{% block title %}Add Visitor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card page-card">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                    <div>
                        <h3 class="section-title mb-1">Visitor Entry</h3>
                        <p class="section-subtitle mb-0">Security can register new visitor arrivals here.</p>
                    </div>
                    <a class="btn btn-outline-secondary" href="{% url 'visitor_list' %}">View Visitor Logs</a>
                </div>

                <form method="POST" class="filter-panel">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary">Add Visitor</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
